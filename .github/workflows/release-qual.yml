name: release-qual
on:
  workflow_dispatch:
jobs:
  release-qual:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: baremetal_lgp
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: ./scripts/ci/lint.sh
      - run: ./scripts/ci/test_unit.sh
      - run: ./scripts/ci/test_property.sh
      - run: ./scripts/ci/test_integration.sh
      - run: ./scripts/ci/test_faults.sh
      - run: ./scripts/ci/test_release_qual.sh
