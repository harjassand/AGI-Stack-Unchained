name: release
on:
  workflow_dispatch:
jobs:
  release:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: baremetal_lgp
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: ./scripts/release/build_release.sh
      - run: ./scripts/release/generate_sbom.sh
      - run: ./scripts/release/generate_provenance.sh
      - run: ./scripts/release/sign_release.sh
      - run: ./scripts/ci/verify_release_artifacts.sh
