[package]
name = "baremetal_lgp"
version = "0.1.0"
edition = "2021"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[dependencies]
crossbeam = "0.8"
parking_lot = "0.12"
rand = "0.8"
rand_xoshiro = "0.6"
libloading = "0.8"
smallvec = "1.13"

[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2"

[features]
trace = []
jit = []
