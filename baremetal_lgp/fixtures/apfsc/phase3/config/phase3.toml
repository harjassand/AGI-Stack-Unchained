[root]
artifact_root = ".apfsc"

[protocol]
version = "apfsc-phase3-mvp-v1"

[bank]
window_len = 256
stride = 64

[limits]
rss_hard_limit_bytes = 12884901888
rss_abort_limit_bytes = 15032385536
max_concurrent_mapped_bytes = 2147483648
segment_bytes = 268435456
state_tile_bytes_max = 2097152
max_public_workers = 2
max_incubator_workers = 1
max_canary_workers = 1
max_transfer_workers = 1
max_robust_workers = 1

[train]
steps = 200
lr = 0.05
eps = 1e-8
l2 = 1e-5
clip_grad = 1.0
batch_windows = 8
shuffle = false

[judge]
public_min_delta_bits = 0.0
holdout_min_delta_bits = 0.0
anchor_max_regress_bits = 999999.0
mini_transfer_min_delta_bits = -999999.0
require_canary_for_a = true
max_holdout_admissions = 8

[lanes]
max_truth_candidates = 12
max_equivalence_candidates = 8
max_incubator_candidates = 8
max_public_candidates = 32

[incubator]
incubator_min_utility_bits = 0.0
lambda_code = 0.1
lambda_risk = 0.1
shadow_steps = 50

[witness]
count = 32
rotation = 8

[phase2]
enabled = true
profile_name = "phase2"
constellation_required = true
min_improved_families = 2
min_nonprotected_improved_families = 1
require_target_subset_hit = false
target_subset = ["det_micro", "sensor_temporal", "phys_sim"]

[phase2.normalization]
codelen_ref_bytes = 10485760
transfer_ref_bytes = 4096
public_static_margin_bpb = -1000000.0
holdout_static_margin_bpb = -1000000.0
holdout_transfer_margin_bpb = -1000000.0
holdout_robust_margin_bpb = -1000000.0

[phase2.weights.det_micro]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.text_code]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.sensor_temporal]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.phys_sim]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.event_sparse]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.formal_alg]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.floors.det_micro]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 0.002
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.text_code]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 0.002
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.sensor_temporal]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.phys_sim]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.event_sparse]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.formal_alg]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.transfer]
steps = 32
lr = 0.03
eps = 1e-8
l2 = 1e-5
clip_grad = 1.0
batch_windows = 8
max_fast_weight_bytes = 262144
max_delta_bits = 524288
reset_ephemeral_state = true
mutable_surfaces = ["nuisance_head", "residual_head", "resid_weights", "fast_weights"]

[phase3]
profile = "phase3"
allow_p_warm = true
allow_p_cold = true
fresh_horizon_epochs = 8

[phase3.budgets]
truth = 0.35
equivalence = 0.20
incubator = 0.25
cold_frontier = 0.20

[phase3.limits]
max_scir_core_ops = 4096
max_macro_calls_per_program = 16
max_macro_expansion_ops = 256
max_macro_depth = 1
max_egraph_nodes = 50000
max_egraph_extractions = 32
max_paradigm_public_candidates = 12
max_pwarm_holdout_admissions = 2
max_pcold_holdout_admissions = 1

[phase3.promotion]
p_warm_min_static_delta_bpb = -1000000.0
p_warm_min_transfer_delta_bpb = -1000000.0
p_warm_max_robust_regress_bpb = 10.0
p_warm_min_recent_family_gain_bpb = -1000000.0
p_cold_min_static_delta_bpb = -1000000.0
p_cold_min_transfer_delta_bpb = -1000000.0
p_cold_min_recent_family_gain_bpb = -1000000.0
p_cold_max_anchor_regret_bpb = 10.0
p_cold_max_error_streak = 3
p_cold_min_improved_families = 0

[phase3.macro]
min_macro_support = 3
min_macro_public_gain_bpb = 0.001
min_macro_reduction_ratio = 1.2
max_induced_macros_per_epoch = 8

[phase3.backend]
allow_graph_backend_public = true
allow_graph_backend_canary = true
allow_graph_backend_holdout = false
require_exact_backend_equiv = true

[phase3.canary]
warm_windows = 128
cold_windows = 256
