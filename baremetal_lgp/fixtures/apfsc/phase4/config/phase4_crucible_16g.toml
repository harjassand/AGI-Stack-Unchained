[root]
artifact_root = ".apfsc"

[protocol]
version = "apfsc-phase4-final-v1"

[train]
lr = 0.05

[phase2]
enabled = true
min_improved_families = 0
min_nonprotected_improved_families = 0
require_target_subset_hit = false
target_subset = ["real_world_series"]

[phase2.weights.event_sparse]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.det_micro]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.text_code]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.sensor_temporal]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.phys_sim]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.formal_alg]
static_weight = 1.0
transfer_weight = 1.0
robust_weight = 1.0

[phase2.weights.real_world_series]
static_weight = 10.0
transfer_weight = 10.0
robust_weight = 10.0

[phase2.floors.det_micro]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.text_code]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.sensor_temporal]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.phys_sim]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.event_sparse]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.formal_alg]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.real_world_series]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 100.0
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.transfer]
steps = 64
lr = 0.03
eps = 0.00000001
l2 = 0.00001
clip_grad = 1.0
batch_windows = 8
max_fast_weight_bytes = 262144
max_delta_bits = 524288
reset_ephemeral_state = false
mutable_surfaces = ["nuisance_head", "residual_head", "resid_weights", "fast_weights"]

[phase3]
profile = "phase3"
allow_p_warm = true
allow_p_cold = true

[phase3.budgets]
truth = 0.1
equivalence = 0.0
incubator = 0.3
cold_frontier = 0.6

[phase3.promotion]
s_class_min_static_delta_bpb = 0.005
p_warm_min_static_delta_bpb = -1000000.0
p_warm_min_transfer_delta_bpb = -1000000.0
p_warm_max_robust_regress_bpb = 10.0
p_warm_min_recent_family_gain_bpb = -1000000.0
p_cold_min_static_delta_bpb = -1000000.0
p_cold_min_transfer_delta_bpb = -1000000.0
p_cold_min_recent_family_gain_bpb = -100.0
p_cold_max_anchor_regret_bpb = 10.0
p_cold_max_error_streak = 3
p_cold_min_improved_families = 0

[phase3.canary]
warm_windows = 0
cold_windows = 0

[lanes]
max_truth_candidates = 1
max_equivalence_candidates = 0
max_incubator_candidates = 2
max_public_candidates = 10

[phase4]
enable_hidden_challenge_gate = true
challenge_min_bucket_score = 0
challenge_retire_after_epochs = 8
holdout_retire_after_epochs = 12
enable_formal_pack = true
enable_tool_pack = true
enable_recombination = true
enable_qd_archive = true
enable_searchlaw = true
enable_need_tokens = true
enable_credit_debt = true
max_hidden_challenge_families = 4
max_searchlaw_public_candidates = 6
max_searchlaw_ab_candidates = 2
searchlaw_min_ab_epochs = 2
searchlaw_max_ab_epochs = 4
searchlaw_required_yield_improvement = 0.0
searchlaw_max_safety_regression = 0.00
max_portfolio_branches = 8
max_branch_local_debt_credits = 3
max_global_debt_credits = 8
max_idle_epochs_before_cull = 3
max_qd_cells = 128
max_needtokens_per_epoch = 8
max_recombination_parents = 2
yield_points_s = 1
yield_points_a = 2
yield_points_pwarm = 3
yield_points_pcold = 4
yield_points_challenge_bonus = 1

# 16GB crucible profile: force sparse/event-driven efficiency and penalize bloat moderately.
[limits]
rss_hard_limit_bytes = 12884901888
rss_abort_limit_bytes = 13958643712
max_concurrent_mapped_bytes = 1073741824
state_tile_bytes_max = 524288
max_param_bits = 8388608

[phase2.normalization]
codelen_ref_bytes = 67108864
transfer_ref_bytes = 4096
public_eval_max_bytes = 262144
public_eval_seed = 42069
holdout_eval_max_bytes = 1048576
canary_eval_max_bytes = 1048576
public_static_margin_bpb = 0.0
holdout_static_margin_bpb = 0.0
holdout_transfer_margin_bpb = 0.0
holdout_robust_margin_bpb = 0.0
