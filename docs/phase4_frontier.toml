[root]
artifact_root = "/Users/harjas/.apfsc"

[protocol]
version = "apfsc-1"

[phase2]
enabled = true
min_improved_families = 2
min_nonprotected_improved_families = 1
require_target_subset_hit = true

[phase2.normalization]
codelen_ref_bytes = 4096
public_static_margin_bpb = 0.001
holdout_static_margin_bpb = 0.001
holdout_transfer_margin_bpb = 0.0
holdout_robust_margin_bpb = 0.0

[phase2.weights.event_sparse]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.det_micro]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.text_code]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.sensor_temporal]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.phys_sim]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.weights.formal_alg]
static_weight = 0.1666666667
transfer_weight = 0.1666666667
robust_weight = 0.1666666667

[phase2.floors.det_micro]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 0.002
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.text_code]
protected = true
max_static_regress_bpb = 0.001
max_transfer_regress_bpb = 0.002
max_robust_regress_bpb = 0.002
min_family_improve_bpb = 0.0005

[phase2.floors.sensor_temporal]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.phys_sim]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.event_sparse]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.floors.formal_alg]
protected = false
max_static_regress_bpb = 0.002
max_transfer_regress_bpb = 0.003
max_robust_regress_bpb = 0.003
min_family_improve_bpb = 0.0005

[phase2.transfer]
steps = 128
lr = 0.03
eps = 1e-8
l2 = 1e-5
clip_grad = 1.0
batch_windows = 8
max_fast_weight_bytes = 262144
max_delta_bits = 524288
reset_ephemeral_state = true
mutable_surfaces = ["nuisance_head", "residual_head", "resid_weights", "fast_weights"]

[phase3]
profile = "phase3"
allow_p_warm = true
allow_p_cold = true

[phase3.canary]
warm_windows = 128
cold_windows = 256

[phase3.promotion]
p_warm_min_static_delta_bpb = 0.0020
p_warm_min_transfer_delta_bpb = 0.0010
p_warm_max_robust_regress_bpb = 0.0005
p_warm_min_recent_family_gain_bpb = 0.0010
p_cold_min_static_delta_bpb = 0.0060
p_cold_min_transfer_delta_bpb = 0.0030
p_cold_min_recent_family_gain_bpb = 0.0025
p_cold_max_anchor_regret_bpb = 0.0010
p_cold_max_error_streak = 3
p_cold_min_improved_families = 2

[promotion]
p_warm_min_recent_family_gain_bpb = 0.0010
p_cold_min_recent_family_gain_bpb = 0.0025
p_cold_min_improved_families = 2

[phase4]
enable_hidden_challenge_gate = true
challenge_min_bucket_score = 0
challenge_retire_after_epochs = 50
holdout_retire_after_epochs = 12
enable_formal_pack = true
enable_tool_pack = true
enable_recombination = true
enable_qd_archive = true
enable_searchlaw = true
enable_need_tokens = true
enable_credit_debt = true
max_hidden_challenge_families = 4
max_searchlaw_public_candidates = 6
max_searchlaw_ab_candidates = 2
searchlaw_min_ab_epochs = 2
searchlaw_max_ab_epochs = 4
searchlaw_required_yield_improvement = 0.20
searchlaw_max_safety_regression = 0.00
max_portfolio_branches = 8
max_branch_local_debt_credits = 3
max_global_debt_credits = 8
max_idle_epochs_before_cull = 3
max_qd_cells = 128
max_needtokens_per_epoch = 8
max_recombination_parents = 2
yield_points_s = 1
yield_points_a = 2
yield_points_pwarm = 3
yield_points_pcold = 4
yield_points_challenge_bonus = 1

[limits]
rss_hard_limit_bytes = 12884901888
rss_abort_limit_bytes = 15032385536
max_concurrent_mapped_bytes = 2147483648
segment_bytes = 268435456
state_tile_bytes_max = 2097152
max_public_workers = 2
max_incubator_workers = 1
max_canary_workers = 1
max_transfer_workers = 1
max_robust_workers = 1

[phase3.budgets]
truth = 0.35
equivalence = 0.15
incubator = 0.25
cold_frontier = 0.25

[train]
steps = 200
batch_windows = 8
lr = 0.05
eps = 1e-8
l2 = 1e-5
clip_grad = 1.0
shuffle = false

[lanes]
max_public_candidates = 24
max_truth_candidates = 12
max_equivalence_candidates = 6
max_incubator_candidates = 6

[incubator]
incubator_min_utility_bits = 1.0
lambda_code = 0.1
lambda_risk = 0.1
shadow_steps = 100

[judge]
public_min_delta_bits = 1.0
holdout_min_delta_bits = 0.5
max_holdout_admissions = 8
require_canary_for_a = true
